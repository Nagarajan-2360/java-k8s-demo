apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: java-demo
  template:
    metadata:
      labels:
        app: java-demo
    spec:
      containers:
      - name: java-demo
        image: nagarajanroshen/java-k8s-demo:latest
        imagePullPolicy: Always 
        ports:
        - containerPort: 8080
